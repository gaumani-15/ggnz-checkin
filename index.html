<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GGNZ Event Check-In</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    max-width:700px;
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

.scan-btn{
    background:#e9e9e9;
}

.checkin-btn{
    background:#28a745;
    color:white;
}

.next-btn{
    background:#007bff;
    color:white;
}

#reader{
    margin-top:15px;
}

.card{
    border:1px solid #ccc;
    border-radius:15px;
    padding:20px;
    margin-top:20px;
}

.status{
    margin-top:20px;
    text-align:center;
}

.success{
    color:green;
    font-size:30px;
    font-weight:bold;
}

.warning{
    color:red;
    font-size:26px;
    font-weight:bold;
}

.wristband{
    font-size:42px;
    font-weight:bold;
    color:#d35400;
    margin-top:15px;
}
</style>
</head>

<body>

<h1>GGNZ Event Check-In</h1>

<button class="scan-btn" onclick="startScanner()">
📷 Start Scanner
</button>

<div id="reader"></div>
    <hr>

<h3>🔍 Manual Lookup</h3>

<input
    type="text"
    id="manualLookup"
    placeholder="Booking ID or Membership Number"
    style="width:100%;padding:12px;font-size:18px;">

<button class="scan-btn" onclick="manualLookup()">
    Find Booking
</button>

<hr>

<div id="bookingInfo"></div>

<div id="status" class="status"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzwMCICNZiKtrJPs_5jAbV_2B7kOEYIF9Gw5fXmNjQoieGEULsDFW7_qAexESGg44yRJQ/exec";

let scanner = null;
let currentBookingId = "";
let currentBooking = null;

function startScanner(){

    document.getElementById("bookingInfo").innerHTML = "";
    document.getElementById("status").innerHTML = "";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        onScanSuccess
    )
    .catch(err=>{
        alert("Camera Error: " + err);
    });
}

async function onScanSuccess(decodedText){

    currentBookingId = decodedText.trim();

    try{
        await scanner.stop();
    }catch(e){}

    lookupBooking(currentBookingId);
}

async function lookupBooking(bookingId){

    document.getElementById("status").innerHTML =
        "Looking up booking...";

    try{

        const response = await fetch(
            API_URL +
            "?action=lookup&bookingId=" +
            encodeURIComponent(bookingId)
        );

        const data = await response.json();

        if(!data.success){

            document.getElementById("status").innerHTML =
                "❌ Booking Not Found";

            return;
        }

        currentBooking = data.booking;

        const checkStatus =
            (currentBooking.checkInStatus || "")
            .trim()
            .toLowerCase();

        let actionArea = "";

        if(checkStatus === "checked in"){

            actionArea = `
            <div class="warning">
            ⚠️ Already Checked In
            </div>
            `;
        }
        else{

            actionArea = `
            <button
                class="checkin-btn"
                onclick="checkInBooking()">
                ✅ Check In
            </button>
            `;
        }

        document.getElementById("bookingInfo").innerHTML = `
        <div class="card">

            <h2>👤 ${currentBooking.memberName}</h2>
<p><b>📱 Phone:</b> ${currentBooking.phoneNumber || ""}</p>
<p><b>🆔 Booking ID:</b> ${currentBooking.bookingId}</p>

<p><b>Membership:</b> ${currentBooking.membershipNumber}</p>

<hr>

<p><b>👨 Adults:</b> ${currentBooking.adults}</p>

<p><b>🧒 Children:</b> ${currentBooking.children}</p>

<p><b>👥 Guests:</b> ${currentBooking.guests}</p>

<p><b>🎟️ Total People:</b> ${currentBooking.totalPeople}</p>

<p><b>Actual Attendees Today:</b></p>

<input
    type="number"
    id="actualAttendees"
    min="0"
    max="${currentBooking.totalPeople}"
    value="${currentBooking.totalPeople}"
    style="width:100%;padding:10px;font-size:18px;">

<p><b>Status:</b> ${currentBooking.checkInStatus}</p>

            ${actionArea}

        </div>
        `;

        document.getElementById("status").innerHTML = "";

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Error: " + err;
    }
}
async function manualLookup(){

    const value =
        document.getElementById("manualLookup")
        .value
        .trim();

    if(!value){

        alert(
            "Enter Booking ID or Membership Number"
        );

        return;
    }

    document.getElementById("status").innerHTML =
        "Looking up booking...";

    try{

        const response = await fetch(
            API_URL +
            "?action=lookupManual&value=" +
            encodeURIComponent(value)
        );

        const data = await response.json();

        if(!data.success){

            document.getElementById("status").innerHTML =
                "❌ Booking Not Found";

            return;
        }

        currentBooking = data.booking;
        currentBookingId = currentBooking.bookingId;

        const checkStatus =
            (currentBooking.checkInStatus || "")
            .trim()
            .toLowerCase();

        let actionArea = "";

        if(checkStatus === "checked in"){

            actionArea = `
            <div class="warning">
            ⚠️ Already Checked In
            </div>
            `;
        }
        else{

            actionArea = `
            <button
                class="checkin-btn"
                onclick="checkInBooking()">
                ✅ Check In
            </button>
            `;
        }

        document.getElementById("bookingInfo").innerHTML = `
        <div class="card">

            <h2>👤 ${currentBooking.memberName}</h2>

            <p><b>🆔 Booking ID:</b>
            ${currentBooking.bookingId}</p>

            <p><b>🎫 Membership:</b>
            ${currentBooking.membershipNumber}</p>
<p><b>💳 Payment:</b> ${currentBooking.paymentStatus}</p>
            <hr>

            <p><b>👨 Adults:</b>
            ${currentBooking.adults}</p>

            <p><b>🧒 Children:</b>
            ${currentBooking.children}</p>

            <p><b>👥 Guests:</b>
            ${currentBooking.guests}</p>

            <p><b>🎟️ Total People:</b> ${currentBooking.totalPeople}</p>

<p><b>Actual Attendees Today:</b></p>

<input
    type="number"
    id="actualAttendees"
    min="0"
    max="${currentBooking.totalPeople}"
    value="${currentBooking.totalPeople}"
    style="width:100%;padding:10px;font-size:18px;">

<p><b>Status:</b> ${currentBooking.checkInStatus}</p>

            ${actionArea}

        </div>
        `;

        document.getElementById("status").innerHTML = "";

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Error: " + err;
    }
}
async function checkInBooking(){

    document.getElementById("status").innerHTML =
        "Checking In...";

    try{

        const actualAttendees =
    document.getElementById("actualAttendees").value;

const response = await fetch(
    API_URL +
    "?action=checkin" +
    "&bookingId=" +
    encodeURIComponent(currentBookingId) +
    "&actualAttendees=" +
    encodeURIComponent(actualAttendees)
);

        const data = await response.json();

        if(data.success){

            document.getElementById("status").innerHTML = `
                <div class="success">
                    ✅ CHECKED IN SUCCESSFULLY
                </div>

                <div class="wristband">
                   🎟️ ISSUE ${
    document.getElementById("actualAttendees").value
} WRISTBANDS
                </div>

                <button
                    class="next-btn"
                    onclick="scanNext()">
                    🔄 Scan Next Attendee
                </button>
            `;
        }
        else{

            document.getElementById("status").innerHTML = `
                <div class="warning">
                    ⚠️ ${data.message}
                </div>

                <button
                    class="next-btn"
                    onclick="scanNext()">
                    🔄 Scan Next Attendee
                </button>
            `;
        }

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Error: " + err;
    }
}

function scanNext(){

    document.getElementById("bookingInfo").innerHTML = "";
    document.getElementById("status").innerHTML = "";

    startScanner();
}

</script>

</body>
</html>
