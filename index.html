<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GGNZ Event Check-In</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    max-width:700px;
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

.scan-btn{
    background:#e9e9e9;
}

.checkin-btn{
    background:#28a745;
    color:white;
}

.next-btn{
    background:#007bff;
    color:white;
}

#reader{
    margin-top:15px;
}

.card{
    border:1px solid #ccc;
    border-radius:15px;
    padding:20px;
    margin-top:20px;
}

.status{
    margin-top:20px;
    text-align:center;
}

.success{
    color:green;
    font-size:28px;
    font-weight:bold;
}

.wristband{
    font-size:42px;
    font-weight:bold;
    color:#d35400;
    margin-top:15px;
}

</style>
</head>

<body>

<h1>GGNZ Event Check-In</h1>

<button class="scan-btn" onclick="startScanner()">
📷 Start Scanner
</button>

<div id="reader"></div>

<div id="bookingInfo"></div>

<div id="status" class="status"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzwMCICNZiKtrJPs_5jAbV_2B7kOEYIF9Gw5fXmNjQoieGEULsDFW7_qAexESGg44yRJQ/exec";

let scanner = null;
let currentBookingId = "";
let currentBooking = null;

function startScanner(){

    document.getElementById("status").innerHTML = "";
    document.getElementById("bookingInfo").innerHTML = "";

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        onScanSuccess
    )
    .catch(err => {
        alert("Camera Error: " + err);
    });
}

async function onScanSuccess(decodedText){

    currentBookingId = decodedText.trim();

    try{
        await scanner.stop();
    }catch(e){}

    lookupBooking(currentBookingId);
}

async function lookupBooking(bookingId){

    document.getElementById("status").innerHTML =
        "Looking up booking...";

    try{

        const response = await fetch(
            API_URL +
            "?action=lookup&bookingId=" +
            encodeURIComponent(bookingId)
        );

        const data = await response.json();

        if(!data.success){

            document.getElementById("status").innerHTML =
                "❌ Booking Not Found";

            return;
        }

        currentBooking = data.booking;

        let buttonHtml = "";

        if(
    currentBooking.checkInStatus &&
    currentBooking.checkInStatus.trim().toLowerCase() === "checked in"
){

            buttonHtml = `
            <div style="margin-top:15px;color:red;font-weight:bold;font-size:22px;">
            ⚠️ Already Checked In
            </div>
            `;
        }
        else{

            buttonHtml = `
            <button
                class="checkin-btn"
                onclick="checkInBooking()">
                ✅ Check In
            </button>
            `;
        }

        document.getElementById("bookingInfo").innerHTML = `
        <div class="card">

            <h2>${currentBooking.memberName}</h2>

            <p><b>Booking ID:</b> ${currentBooking.bookingId}</p>

            <p><b>Membership:</b> ${currentBooking.membershipNumber}</p>

            <p><b>Adults:</b> ${currentBooking.adults}</p>

            <p><b>Children:</b> ${currentBooking.children}</p>

            <p><b>Guests:</b> ${currentBooking.guests}</p>

            <p><b>Total:</b> ${currentBooking.totalPeople}</p>

            <p><b>Status:</b> ${currentBooking.checkInStatus}</p>

            ${buttonHtml}

        </div>
        `;

        document.getElementById("status").innerHTML = "";

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Error: " + err;
    }
}

async function checkInBooking(){

    document.getElementById("status").innerHTML =
        "Checking In...";

    try{

        const response = await fetch(
            API_URL +
            "?action=checkin&bookingId=" +
            encodeURIComponent(currentBookingId)
        );

        const data = await response.json();

        if(data.success){

            document.getElementById("status").innerHTML = `
                <div class="success">
                    ✅ CHECKED IN SUCCESSFULLY
                </div>

                <div class="wristband">
                    🎟️ ISSUE ${currentBooking.totalPeople} WRISTBANDS
                </div>

                <button
                    class="next-btn"
                    onclick="scanNext()">
                    🔄 Scan Next Attendee
                </button>
            `;

        }else{

            document.getElementById("status").innerHTML = `
                <div style="color:red;font-size:24px;font-weight:bold;">
                ⚠️ ${data.message}
                </div>

                <div class="wristband">
                🎟️ ISSUE ${currentBooking.totalPeople} WRISTBANDS
                </div>

                <button
                    class="next-btn"
                    onclick="scanNext()">
                    🔄 Scan Next Attendee
                </button>
            `;
        }

    }
    catch(err){

        document.getElementById("status").innerHTML =
            "❌ Error: " + err;
    }
}

function scanNext(){

    document.getElementById("bookingInfo").innerHTML = "";
    document.getElementById("status").innerHTML = "";

    startScanner();
}

</script>

</body>
</html>
